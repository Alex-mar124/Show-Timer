name: Build macOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:          # also triggerable manually from GitHub Actions tab

jobs:
  build-macos-arm:
    name: macOS Apple Silicon (M-series)
    runs-on: macos-14          # Apple Silicon GitHub runner — native aarch64

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 3. Rust ────────────────────────────────────────────────────────────
      - name: Install Rust stable (aarch64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── 4. JS deps ─────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 5. Icons ───────────────────────────────────────────────────────────
      - name: Generate app icons
        run: |
          python3 - <<'EOF'
          import struct, zlib

          def png(w, h, r, g, b):
              def chunk(name, data):
                  name = name.encode()
                  crc = zlib.crc32(name + data) & 0xFFFFFFFF
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)
              raw = b''.join(b'\x00' + bytes([r, g, b] * w) for _ in range(h))
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              return b'\x89PNG\r\n\x1a\n' + chunk('IHDR', ihdr) + chunk('IDAT', zlib.compress(raw)) + chunk('IEND', b'')

          with open('app-icon.png', 'wb') as f:
              f.write(png(512, 512, 245, 158, 11))   # #F59E0B amber
          print('Created 512×512 amber app-icon.png')
          EOF
          npx @tauri-apps/cli icon app-icon.png
          echo "Icons generated:"
          ls src-tauri/icons/

      # ── 6. Build — .app bundle only (skip DMG, avoids bundle_dmg.sh CI issues)
      - name: Build macOS app (ad-hoc signed, .app bundle)
        run: npx tauri build --target aarch64-apple-darwin --bundles app
        env:
          # Ad-hoc signing ("-") — no Apple Developer account needed.
          # To open: right-click → Open, or run:
          #   xattr -cr /path/to/Show\ Timer.app
          APPLE_SIGNING_IDENTITY: '-'

      # ── 7. Zip the .app so GitHub can serve it as a single download ─────────
      - name: Zip .app bundle
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          zip -r "$GITHUB_WORKSPACE/ShowTimer-macOS-AppleSilicon.zip" "Show Timer.app"
          echo "Zipped:"
          ls -lh "$GITHUB_WORKSPACE/ShowTimer-macOS-AppleSilicon.zip"

      # ── 8. Upload ──────────────────────────────────────────────────────────
      - name: Upload .app zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShowTimer-macOS-AppleSilicon
          path: ShowTimer-macOS-AppleSilicon.zip
          retention-days: 90
          if-no-files-found: error
