name: Build & Release

on:
  push:
    tags: ['v*']        # git tag v1.0.0 && git push origin v1.0.0
  workflow_dispatch:    # manual run from Actions tab (builds artifacts, no release)

permissions:
  contents: write       # needed to create GitHub releases

jobs:
  # ── Windows x64 ────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Generate app icons
        run: npx @tauri-apps/cli icon src-tauri/app-icon.svg

      - name: Build Windows installer (NSIS)
        run: npx tauri build --bundles nsis

      - name: Rename installer
        shell: pwsh
        run: |
          $src = Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          Write-Host "Found: $($src.FullName)"
          Copy-Item $src.FullName "ShowTimer-Windows-x64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ShowTimer-Windows-x64.exe

  # ── macOS Apple Silicon (M1/M2/M3/M4) — native arm64 ──────────────────────
  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Generate app icons
        run: npx @tauri-apps/cli icon src-tauri/app-icon.svg

      - name: Build macOS app (arm64)
        run: npx tauri build --target aarch64-apple-darwin --bundles app
        env:
          APPLE_SIGNING_IDENTITY: '-'

      - name: Zip .app bundle
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          zip -r "$GITHUB_WORKSPACE/ShowTimer-macOS-AppleSilicon.zip" "Show Timer.app"
          ls -lh "$GITHUB_WORKSPACE/ShowTimer-macOS-AppleSilicon.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: ShowTimer-macOS-AppleSilicon.zip

  # ── macOS Universal (Intel + Apple Silicon fat binary) — no Intel runner needed
  build-macos-universal:
    name: macOS Universal (Intel + Apple Silicon)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Generate app icons
        run: npx @tauri-apps/cli icon src-tauri/app-icon.svg

      - name: Build macOS universal app
        run: npx tauri build --target universal-apple-darwin --bundles app
        env:
          APPLE_SIGNING_IDENTITY: '-'

      - name: Zip .app bundle
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/macos
          zip -r "$GITHUB_WORKSPACE/ShowTimer-macOS-Universal.zip" "Show Timer.app"
          ls -lh "$GITHUB_WORKSPACE/ShowTimer-macOS-Universal.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: ShowTimer-macOS-Universal.zip

  # ── GitHub Release (only on version tags) ──────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos-arm, build-macos-universal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Show Timer ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/ShowTimer-Windows-x64.exe
            artifacts/ShowTimer-macOS-AppleSilicon.zip
            artifacts/ShowTimer-macOS-Universal.zip
          body: |
            ## Download

            | Platform | File |
            |---|---|
            | Windows 10/11 (64-bit) | `ShowTimer-Windows-x64.exe` |
            | macOS Apple Silicon (M1 – M4) | `ShowTimer-macOS-AppleSilicon.zip` |
            | macOS Universal — Intel + Apple Silicon | `ShowTimer-macOS-Universal.zip` |

            ---

            ### Windows
            Run `ShowTimer-Windows-x64.exe` — the NSIS installer guides you through setup.

            ### macOS
            1. Unzip the `.zip`
            2. Drag **Show Timer.app** to your Applications folder
            3. **First launch:** right-click the app → **Open** (required once to bypass Gatekeeper for unsigned apps)

            **Not sure which Mac you have?** Use the Universal build — it runs natively on both Intel and Apple Silicon.

            > The macOS build is ad-hoc signed (no Apple Developer account). After the first right-click → Open, it launches normally from the dock.
